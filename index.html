<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SLIDOO | パズル × ずかん</title>
  <meta name="description" content="SLIDOOは、スライドパズルで遊びながら、ずかんを集めて学べるカジュアルゲームです。" />

  <style>
    :root{
      --bg: #33CC99;
      --panel: rgba(255,255,255,.92);
      --panel2: rgba(255,255,255,.85);
      --text: #0b2b22;
      --muted: rgba(11,43,34,.72);
      --line: rgba(11,43,34,.12);
      --shadow: 0 18px 50px rgba(0,0,0,.18);
      --radius: 18px;
      --max: 1040px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
                   Arial, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap{ max-width: var(--max); margin: 0 auto; padding: 0 18px; }

    section{ padding: 40px 0; }

    .section-title{
      display:flex; align-items:baseline; gap: 12px;
      margin: 0 0 20px;
    }
    .section-title h2{
      margin:0;
      font-size: 24px;
    }
    .section-title span{
      font-size: 12px;
      color: rgba(11,43,34,.62);
      letter-spacing: .18em;
    }

    .contact-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 860px){
      .contact-grid{ grid-template-columns: 1fr; }
    }

    .box{
      border-radius: var(--radius);
      border: 1px solid rgba(11,43,34,.12);
      background: rgba(255,255,255,.92);
      padding: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }
    .box h3{ margin:0 0 14px; font-size: 18px; }
    .box p{ margin:0 0 14px; color: var(--muted); line-height: 1.8; }

    form{ margin-top: 10px; }
    label{ display:block; font-size: 14px; font-weight: 900; margin: 14px 0 6px; }
    input, textarea{
      width:100%;
      border-radius: 12px;
      border: 1px solid rgba(11,43,34,.18);
      padding: 12px;
      font-size: 14px;
      background: rgba(255,255,255,.95);
    }
    textarea{ min-height: 120px; resize: vertical; }

    .form-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 680px){
      .form-row{ grid-template-columns: 1fr; }
    }

    .btn{
      margin-top: 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, rgba(255,183,3,.6), rgba(132,204,22,.6));
      font-weight: 900;
      cursor:pointer;
    }

    footer{
      padding: 30px 0;
      text-align:center;
      font-size: 12px;
      color: rgba(11,43,34,.70);
    }
  </style>
</head>

<body>

<section id="contact">
  <div class="wrap">
    <div class="section-title">
      <h2>お問い合わせ（サポート）</h2><span>SUPPORT</span>
    </div>

    <div class="contact-grid">
      <div class="box">
        <h3>サポート窓口</h3>
        <p>
          ご質問・不具合報告はこちらから。<br>
          通常 <b>2〜3営業日以内</b> を目安に返信します。
        </p>

        <p>
          できれば「端末(iPhone機種)」「iOSバージョン」「発生手順」「スクショ」を添えてください。
        </p>

        <p style="font-weight:900; margin-top:20px;">
          k71n916@yahoo.co.jp
        </p>
      </div>

      <div class="box">
        <h3>お問い合わせフォーム</h3>

        <form id="supportForm">
          <div class="form-row">
            <div>
              <label for="name">お名前（任意）</label>
              <input id="name" type="text" />
            </div>
            <div>
              <label for="email">返信先メール（任意）</label>
              <input id="email" type="email" />
            </div>
          </div>

          <label for="subject">件名</label>
          <input id="subject" type="text" required />

          <label for="message">内容</label>
          <textarea id="message" required></textarea>

          <button class="btn" type="submit">メールで送信する</button>
        </form>
      </div>
    </div>
  </div>
</section>

<footer>
  © 2026 Prism Apps / SLIDOO
</footer>

</body>
</html>
